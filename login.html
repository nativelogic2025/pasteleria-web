<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Pastelería La Estrella</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        .auth-wrapper {
            display: flex;
            min-height: 80vh;
            align-items: center;
            justify-content: center;
            background-color: var(--color-bg);
            padding: 2rem;
        }

        .auth-container {
            background: var(--color-white);
            max-width: 450px;
            width: 100%;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            text-align: center;
        }

        .auth-container .logo-img {
            height: 60px;
            margin: 0 auto 1rem;
        }

        .auth-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--color-primary);
        }

        .auth-subtitle {
            color: var(--color-text-light);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-text);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            font-family: var(--font-body);
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(140, 85, 53, 0.1);
        }

        .auth-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .auth-link {
            color: var(--color-secondary);
            font-weight: 500;
        }

        .auth-link:hover {
            color: var(--color-primary);
            text-decoration: underline;
        }

        .btn-full {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
        }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--color-text-light);
        }
    </style>
</head>

<body>

        <header-component></header-component>

    <div class="auth-wrapper">
        <div class="auth-container">
            <img src="img/logo.jpeg" alt="Logotipo" class="logo-img">
            <h1 class="auth-title">Bienvenido de vuelta</h1>
            <p class="auth-subtitle">Inicia sesión para crear o ver tus pedidos.</p>

            <form action="crear-pedido.html" method="GET" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="auth-actions">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="recuperar.html" class="auth-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Iniciar Sesión</button>
            </form>

            <div class="auth-footer">
                ¿Aún no tienes cuenta? <a href="registro.html" class="auth-link">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <script src="js/components.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.textContent = 'Verificando...';
            btn.disabled = true;
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const user = await loginCliente(email, password);
                
                if (user) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', user.correo);
                    localStorage.setItem('userId', user.id_cliente);
                    localStorage.setItem('userName', user.nombre);
                    
                    const redirectUrl = localStorage.getItem('redirectAfterLogin') || 'crear-pedido.html';
                    localStorage.removeItem('redirectAfterLogin'); // Limpiar para futuros usos
                    window.location.href = redirectUrl;
                } else {
                    alert('Correo electrónico o contraseña incorrectos.');
                    btn.textContent = 'Iniciar Sesión';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                alert("Error de conexión al iniciar sesión.");
                btn.textContent = 'Iniciar Sesión';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
