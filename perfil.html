<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Pastelería La Estrella</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        .profile-wrapper {
            background-color: var(--color-bg);
            padding: 4rem 1rem;
            min-height: 70vh;
        }

        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--color-white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .profile-header {
            background-color: var(--color-primary);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .profile-avatar {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #fcf5ee;
        }

        .profile-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .profile-body {
            padding: 2.5rem 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-text);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            font-family: var(--font-body);
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .form-control:disabled {
            background-color: #f3f4f6;
            color: #6b7280;
            cursor: not-allowed;
        }

        .btn-full {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        
        div.logout-btn-container {
            margin-top: 2rem;
            text-align: center;
            border-top: 1px solid var(--color-border);
            padding-top: 1.5rem;
        }

        .orders-section {
            background-color: #fdfaf6;
            border-top: 1px solid var(--color-border);
            padding: 2.5rem 2rem;
        }

        .orders-title {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            color: var(--color-text);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .order-card {
            background: white;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            text-decoration: none;
            color: inherit;
        }

        .order-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--color-primary);
            transform: translateY(-2px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--color-border);
            padding-bottom: 0.8rem;
        }

        .order-folio {
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--color-primary);
            font-size: 1.1rem;
        }

        .order-date {
            font-size: 0.85rem;
            color: var(--color-text-light);
        }

        .order-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-pendiente { background-color: #fef3c7; color: #d97706; }
        .status-elaboracion { background-color: #dbeafe; color: #2563eb; }
        .status-cancelado { background-color: #fee2e2; color: #dc2626; }
        .status-completado, .status-entregado { background-color: #d1fae5; color: #059669; }

        .empty-orders {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--color-text-light);
            background: white;
            border-radius: var(--border-radius);
            border: 1px dashed var(--color-border);
        }
    </style>
</head>

<body>

    <header-component></header-component>

    <div class="profile-wrapper">
        <div class="profile-container">
            <div class="profile-header">
                <i class="fas fa-user-circle profile-avatar"></i>
                <h1 class="profile-title" id="displayNombre">Mi Perfil</h1>
                <p style="opacity: 0.9;">Administra tu información personal</p>
            </div>

            <div class="profile-body">
                <form id="profileForm">
                    <div class="form-group">
                        <label class="form-label" for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Ej. Juan Pérez" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="telefono">Teléfono (WhatsApp)</label>
                        <input type="tel" id="telefono" class="form-control" placeholder="10 dígitos" required pattern="[0-9]{10}">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="correo">Correo Electrónico</label>
                        <input type="email" id="correo" class="form-control" disabled title="El correo no se puede cambiar">
                    </div>

                    <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-save" style="margin-right: 8px;"></i> Guardar Cambios</button>
                </form>

                <div class="logout-btn-container">
                    <button class="btn btn-outline" id="logoutBtn" style="color: #ef4444; border-color: #ef4444;"><i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i> Cerrar Sesión</button>
                </div>
            </div>

            <!-- Orders Section -->
            <div class="orders-section">
                <h2 class="orders-title"><i class="fas fa-shopping-bag" style="color: var(--color-primary);"></i> Mis Pedidos</h2>
                <div id="ordersContainer">
                    <div style="text-align: center; padding: 2rem;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--color-primary);"></i>
                        <p style="margin-top: 1rem; color: var(--color-text-light);">Cargando tu historial...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer-component></footer-component>

    <script src="js/components.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Validar sesión
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
                return;
            }

            // Datos actuales del localStorage y base de datos
            const idCliente = localStorage.getItem('userId');
            const emailCliente = localStorage.getItem('userEmail');
            
            // Llenar campos con cache
            document.getElementById('displayNombre').textContent = localStorage.getItem('userName') || "Mi Perfil";
            document.getElementById('nombre').value = localStorage.getItem('userName') || "";
            document.getElementById('correo').value = emailCliente;

            // Hacer fetch de los datos reales del cliente para sacar el teléfono que quizá no esté en cache
            try {
                const res = await fetch(`${SUPABASE_URL}/clientes?id_cliente=eq.${idCliente}&select=*`, {
                    headers: HEADERS
                });
                const data = await res.json();
                if (data && data.length > 0) {
                    document.getElementById('telefono').value = data[0].telefono || "";
                }
            } catch (e) {
                console.error("Error cargando teléfono:", e);
            }

            // Cargar Historial de Pedidos
            try {
                const pedidos = await obtenerPedidosPorCliente(idCliente);
                const container = document.getElementById('ordersContainer');
                
                if (!pedidos || pedidos.length === 0) {
                    container.innerHTML = `
                        <div class="empty-orders">
                            <i class="fas fa-box-open" style="font-size: 3rem; margin-bottom: 1rem; color: #d1d5db;"></i>
                            <h3 style="font-family: var(--font-heading); color: var(--color-text);">Aún no tienes pedidos</h3>
                            <p style="margin-top: 5px;">Cuando realices una compra, aparecerá aquí.</p>
                            <a href="index.html" class="btn btn-primary" style="margin-top: 1.5rem; display: inline-block;">Ver Catálogo</a>
                        </div>
                    `;
                } else {
                    let html = '';
                    pedidos.forEach(p => {
                        const dateObj = new Date(p.created_at);
                        const cleanDate = dateObj.toLocaleDateString('es-MX', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                        
                        let badgeClass = 'status-pendiente';
                        let estadoTexto = p.estado || 'Pendiente';
                        
                        if (estadoTexto.toLowerCase() === 'elaboracion' || estadoTexto.toLowerCase() === 'preparacion') badgeClass = 'status-elaboracion';
                        if (estadoTexto.toLowerCase() === 'completado' || estadoTexto.toLowerCase() === 'entregado') badgeClass = 'status-completado';
                        if (estadoTexto.toLowerCase() === 'cancelado') badgeClass = 'status-cancelado';

                        html += `
                            <a href="ver-pedido.html?folio=${p.folio}" class="order-card">
                                <div class="order-header">
                                    <div class="order-folio"><i class="fas fa-receipt" style="margin-right: 5px; color: var(--color-text-light);"></i> ${p.folio}</div>
                                    <div class="status-badge ${badgeClass}">${estadoTexto}</div>
                                </div>
                                <div class="order-details">
                                    <div class="order-date"><i class="far fa-calendar-alt" style="margin-right: 5px;"></i> ${cleanDate}</div>
                                    <div style="font-weight: 600; color: var(--color-text);">Total: $${parseFloat(p.total).toFixed(2)}</div>
                                </div>
                                <div style="font-size: 0.85rem; color: var(--color-primary); text-align: right; margin-top: 0.5rem; font-weight: 500;">
                                    Ver Detalle <i class="fas fa-chevron-right" style="margin-left: 3px; font-size: 0.75rem;"></i>
                                </div>
                            </a>
                        `;
                    });
                    container.innerHTML = html;
                }
            } catch(e) {
                console.error("Error al cargar pedidos:", e);
                document.getElementById('ordersContainer').innerHTML = "<p style='color:red;'>Ocurrió un error al cargar tu historial. Intenta nuevamente.</p>";
            }
        });

        document.getElementById('profileForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
            btn.disabled = true;

            const idCliente = localStorage.getItem('userId');
            const nuevoNombre = document.getElementById('nombre').value.trim();
            const nuevoTelefono = document.getElementById('telefono').value.trim();

            try {
                const actualizacionExitosa = await actualizarCliente(idCliente, {
                    nombre: nuevoNombre,
                    telefono: nuevoTelefono
                });

                if (actualizacionExitosa) {
                    // Actualizar UI y cache
                    localStorage.setItem('userName', nuevoNombre);
                    document.getElementById('displayNombre').textContent = nuevoNombre;
                    alert("¡Tus datos han sido actualizados con éxito!");
                } else {
                    alert("Hubo un error al actualizar los datos.");
                }
            } catch (error) {
                console.error("Error al guardar perfil:", error);
                alert("Error de conexión al guardar cambios.");
            } finally {
                btn.innerHTML = '<i class="fas fa-save" style="margin-right: 8px;"></i> Guardar Cambios';
                btn.disabled = false;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            if(confirm("¿Estás seguro que deseas cerrar sesión?")) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userId');
                localStorage.removeItem('userName');
                localStorage.removeItem('carritoActivo'); // Clear cart session info too
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
