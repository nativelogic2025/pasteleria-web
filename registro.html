<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | Pastelería La Estrella</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        .auth-wrapper {
            display: flex;
            min-height: 80vh;
            align-items: center;
            justify-content: center;
            background-color: var(--color-bg);
            padding: 2rem;
        }

        .auth-container {
            background: var(--color-white);
            max-width: 500px;
            width: 100%;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            text-align: center;
        }

        .auth-container .logo-img {
            height: 60px;
            margin: 0 auto 1rem;
        }

        .auth-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--color-primary);
        }

        .auth-subtitle {
            color: var(--color-text-light);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-text);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            font-family: var(--font-body);
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(140, 85, 53, 0.1);
        }

        .btn-full {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
        }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--color-text-light);
        }

        .auth-link {
            color: var(--color-secondary);
            font-weight: 500;
        }

        .auth-link:hover {
            color: var(--color-primary);
            text-decoration: underline;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
    </style>
</head>

<body>

        <header-component></header-component>

    <div class="auth-wrapper">
        <div class="auth-container">
            <img src="img/logo.jpeg" alt="Logotipo" class="logo-img">
            <h1 class="auth-title">Crea tu Cuenta</h1>
            <p class="auth-subtitle">Únete para realizar pedidos y darles seguimiento.</p>

            <form action="login.html" method="GET" id="registerForm">

                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label" for="nombre">Nombre</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Nombre" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="apellidos">Apellidos</label>
                        <input type="text" id="apellidos" class="form-control" placeholder="Apellidos" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="telefono">Teléfono (WhatsApp)</label>
                    <input type="tel" id="telefono" class="form-control" placeholder="10 dígitos" required
                        pattern="[0-9]{10}">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="Min. 8 caracteres" required
                        minlength="8">
                </div>

                <button type="submit" class="btn btn-primary btn-full">Registrarme</button>
            </form>

            <div class="auth-footer">
                ¿Ya tienes cuenta? <a href="login.html" class="auth-link">Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script src="js/components.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.textContent = 'Registrando...';
            btn.disabled = true;

            const datosCliente = {
                nombre: document.getElementById('nombre').value.trim(),
                apellidos: document.getElementById('apellidos').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            };

            try {
                await registrarCliente(datosCliente);
                alert("¡Cuenta creada exitosamente! Ahora puedes iniciar sesión.");
                window.location.href = 'login.html';
            } catch (error) {
                console.error(error);
                alert("Error al registrar cuenta: " + error.message);
                btn.textContent = 'Registrarme';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
