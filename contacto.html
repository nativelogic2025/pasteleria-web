<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Pastelería La Estrella</title>
    <meta name="description" content="Ponte en contacto con Pastelería La Estrella.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header-component></header-component>

    <!-- Page Header -->
    <section class="page-header"
        style="background-color: var(--color-primary); color: white; padding: 4rem 0; text-align: center;">
        <div class="container">
            <h1 class="hero-title" style="font-size: 2.5rem; margin-bottom: 1rem;">Estamos para servirte</h1>
            <p style="font-size: 1.1rem; opacity: 0.9;">Preguntas, cotizaciones para eventos grandes o solo saludar.</p>
        </div>
    </section>

    <!-- Contact Content -->
    <section class="section">
        <div class="container" style="max-width: 600px; margin: 0 auto;">

            <!-- Contact Form -->
            <div
                style="background-color: #fcf5ee; padding: 2.5rem; border-radius: var(--border-radius); box-shadow: var(--shadow-sm);">
                <h3 style="font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--color-primary); text-align: center;">Envíanos un Mensaje</h3>
                <form id="contactForm">

                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Nombre</label>
                        <input type="text" id="form-nombre" name="nombre"
                            style="width: 100%; padding: 0.8rem; border: 1px solid var(--color-border); border-radius: var(--border-radius);"
                            placeholder="Tu nombre" required>
                    </div>

                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Correo Electrónico</label>
                        <input type="email" id="form-correo" name="correo"
                            style="width: 100%; padding: 0.8rem; border: 1px solid var(--color-border); border-radius: var(--border-radius);"
                            placeholder="tu@correo.com" required>
                    </div>

                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Asunto</label>
                        <select id="form-asunto" name="asunto"
                            style="width: 100%; padding: 0.8rem; border: 1px solid var(--color-border); border-radius: var(--border-radius);">
                            <option value="Duda General">Duda General</option>
                            <option value="Cotización Evento Grande (Boda/XV años)">Cotización Evento Grande (Boda/XV años)</option>
                            <option value="Problema con Mi Pedido">Problema con Mi Pedido</option>
                            <option value="Trabaja con Nosotros">Trabaja con Nosotros</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Mensaje</label>
                        <textarea id="form-mensaje" name="mensaje"
                            style="width: 100%; padding: 0.8rem; border: 1px solid var(--color-border); border-radius: var(--border-radius); min-height: 120px; resize: vertical;"
                            placeholder="¿En qué te podemos ayudar?" required></textarea>
                    </div>

                    <button type="submit" id="btn-submit" class="btn btn-primary" style="width: 100%;">Enviar Mensaje</button>

                </form>

                <!-- Mensaje de Éxito Oculto Inicialmente -->
                <div id="success-message" style="display: none; background-color: #d1fae5; color: #065f46; padding: 1.5rem; border-radius: var(--border-radius); text-align: center; border: 1px solid #34d399; margin-top: 1rem;">
                    <i class="fas fa-check-circle" style="font-size: 2rem; margin-bottom: 0.5rem; color: #10b981;"></i>
                    <h4 style="margin-bottom: 0.5rem;">¡Mensaje enviado con éxito!</h4>
                    <p>Hemos recibido tus datos. Te responderemos al correo proporcionado a la brevedad posible.</p>
                </div>
            </div>

        </div>
    </section>

    <!-- Footer ... -->
    <footer-component></footer-component>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // INSTRUCCIÓN: Sustituye 'TU_PUBLIC_KEY' con la Public Key que te dé EmailJS
            emailjs.init("thjPuoMDP3dKRlyi7");
        })();

        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
            btn.disabled = true;

            // INSTRUCCIÓN: Sustituye estos dos valores con los de tu cuenta de EmailJS
            const serviceID = 'service_dr6spge'; // O el service ID que hayas creado (Ej. 'service_xxxxxx')
            const templateID = 'template_9uoe67d'; // Reemplazar (Ej. 'template_xxxxxx')

            emailjs.sendForm(serviceID, templateID, this)
                .then(() => {
                    // Éxito: Ocultar formulario y mostrar mensaje verde
                    document.getElementById('contactForm').style.display = 'none';
                    document.getElementById('success-message').style.display = 'block';
                }, (err) => {
                    // Error
                    btn.innerHTML = 'Enviar Mensaje';
                    btn.disabled = false;
                    alert("Ocurrió un error al enviar el mensaje. Por favor intenta de nuevo. Error: " + JSON.stringify(err));
                });
        });
    </script>
</body>

</html>
